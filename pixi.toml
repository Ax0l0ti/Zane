[project]
name = "zane"
version = "0.1.0"
description = "A stoic, self-extending AI exocortex"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-arm64"]

[tasks]
# Run both backend and frontend dev servers
dev = "python dev.py"

# Run just the backend
server = "python main.py"

# Build the frontend for production
build-ui = { cmd = "npm run build", cwd = "ui" }

[dependencies]
python = ">=3.13.11,<3.15"
nodejs = ">=25.2.1,<25.3"
fastapi = ">=0.128.0,<0.129"
uvicorn = ">=0.40.0,<0.41"
pydantic = ">=2.12.5,<3"
python-dotenv = ">=1.2.1,<2"
gitpython = ">=3.1.46,<4"
anthropic = ">=0.76.0,<0.77"
openai = ">=2.15.0,<3"
pyyaml = ">=6.0.3,<7"
chromadb = ">=0.3.23,<0.7"
