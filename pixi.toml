[project]
name = "zane"
version = "0.1.0"
description = "A stoic, self-extending AI exocortex"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-arm64"]

[tasks]
# Run both backend and frontend dev servers
dev = "python dev.py"

# Run just the backend
server = "python main.py"

# Build the frontend for production
build-ui = { cmd = "npm run build", cwd = "ui" }

[dependencies]
python = ">=3.11"
nodejs = ">=18.0.0"
fastapi = ">=0.109.0"
uvicorn = ">=0.27.0"
pydantic = ">=2.5.0"
python-dotenv = ">=1.0.0"
gitpython = ">=3.1.0"

# LLM providers
anthropic = ">=0.18.0"
openai = ">=1.0.0"

# Knowledge base
pyyaml = ">=6.0"

# Vector store (Phase 5)
chromadb = ">=0.4.0"
